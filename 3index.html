<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Epicurios IA Sommelier</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f5f1e6, #e8dcc7);
  color: #3b1f1f;
}

/* HEADER */
.header {
  text-align: center;
  padding: 60px 20px 20px;
}

h1 {
  font-size: 42px;
  color: #6b1f2b; /* bordeaux */
  margin-bottom: 10px;
}

.subtitle {
  color: #6b5b4b;
  font-size: 16px;
}

/* CARD */
.card {
  background: white;
  max-width: 600px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 10px;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  background: #6b1f2b;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  background: #52151d;
}

/* RESULT */
#result {
  margin-top: 25px;
  padding: 15px;
  background: #f8f3ea;
  border-radius: 10px;
  color: #3b1f1f;
  min-height: 40px;
}
</style>

</head>

<body>

<div class="header">
  <h1>🍷 Epicurios IA</h1>
  <div class="subtitle">Ton sommelier personnel intelligent</div>
</div>

<div class="card">

  <input id="input" placeholder="Ex : avec du poisson, un apéro, un dessert..." />

  <button onclick="send()">Demander conseil</button>

  <div id="result"></div>

</div>

<script>
async function send() {
  const message = document.getElementById("input").value;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  document.getElementById("result").innerText = data.reply;
}
</script>

</body>
</html>
